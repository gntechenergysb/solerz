<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Solerz | Solar Equipment Listings</title>
  <meta name="description"
    content="Solerz is a global solar equipment marketplace for B2B, B2C, and C2C trades. Browse verified wholesale and community listings for panels, inverters, batteries, cables, and more." />

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://solerz.com/" />
  <meta property="og:title" content="Solerz | Global Solar Equipment Marketplace" />
  <meta property="og:description"
    content="Browse global solar equipment listings. Verified wholesale and community trades for B2B, B2C, and C2C markets." />
  <!-- Updated OG Image to the profile photo style logo -->
  <meta property="og:image" content="https://solerz.com/profile-photo.png" />

  <!-- Twitter -->
  <meta property="twitter:card" content="summary_large_image" />
  <meta property="twitter:url" content="https://solerz.com/" />
  <meta property="twitter:title" content="Solerz | Global Solar Equipment Marketplace" />
  <meta property="twitter:description"
    content="Browse global solar equipment listings. Verified wholesale and community trades for B2B, B2C, and C2C markets." />
  <meta name="twitter:image" content="https://solerz.com/theme_logo.png" />
  <link id="app-favicon" rel="icon" type="image/png" href="/icon.png?v=20260202">
  <script>
    (function () {
      try {
        var key = 'solerz_theme';
        var saved = localStorage.getItem(key);
        var prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
        var theme = saved === 'light' || saved === 'dark' ? saved : (prefersDark ? 'dark' : 'light');

        if (theme === 'dark') {
          document.documentElement.classList.add('dark');
        } else {
          document.documentElement.classList.remove('dark');
        }

        var favicon = document.getElementById('app-favicon');
        if (favicon) {
          favicon.setAttribute('href', theme === 'dark' ? '/icon-dark.png?v=20260202' : '/icon.png?v=20260202');
        }
      } catch (e) {
        // ignore
      }
    })();
  </script>
